<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <canvas style="border: 1px solid black" width=1000 height=800></canvas>
  <script>
    let canvasElem = document.querySelector("canvas")
    let ctx = canvasElem.getContext("2d")

    ctx.beginPath()
    ctx.strokeStyle = "red"
    ctx.lineWidth = 3
    ctx.fillStyle = "dodgerblue"
    ctx.fillRect(10, 8, 100, 100)
    ctx.strokeRect(10, 8, 100, 100)
    ctx.clearRect(100, 18, 100, 50)
    //stroked rectangle

    //line
    ctx.beginPath()
    ctx.moveTo(120, 8)
    ctx.lineTo(220, 100)
    ctx.strokeStyle = "dodgerblue"
    ctx.lineWidth = 4
    ctx.lineCap = "round"
    ctx.stroke()
    //Arc
    ctx.beginPath()
    ctx.strokeStyle = "red"
    ctx.arc(100, 290, 90, 0, 1.5 * Math.PI)
    ctx.stroke()

    //Half Arc
    ctx.beginPath()
    ctx.strokeStyle = "black"
    ctx.arc(300, 290, 90, 0, 1.0 * Math.PI)
    ctx.fillStyle = "dodgerblue"
    ctx.fill()
    ctx.stroke()

    //Bisected Square
    ctx.beginPath()
    ctx.fillStyle = "grey"
    ctx.fill()
    ctx.fillRect(30, 420, 200, 150)
    ctx.clearRect(90, 460, 150, 70)
    //90 away from the x axis, 460 downwards from the top, 150=the width, 70 the height

    //PlentyRectangles
    ctx.beginPath();
    ctx.rect(350, 400, 500, 300);
    ctx.lineWidth = 5;
    ctx.strokeStyle = "red";
    ctx.stroke();

    ctx.beginPath();
    ctx.rect(400, 440, 150, 150);
    ctx.lineWidth = 6;
    ctx.strokeStyle = "green";
    ctx.stroke();

    ctx.beginPath();
    ctx.rect(440, 480, 350, 200);
    ctx.lineWidth = 12;
    ctx.strokeStyle = "blue";
    ctx.stroke();





  </script>
</body>

</html>
